<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Premium Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(90deg, #818cf8, #e879f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen custom-scroll">

    <nav class="sticky top-0 z-50 glass px-6 py-4 mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-extrabold tracking-tight">NEXUS<span class="text-indigo-500">.</span></h1>
            <div class="flex gap-6 items-center">
                <button onclick="showView('profiles')" class="hover:text-indigo-400 transition">Explore</button>
                <button onclick="showView('join')" class="hover:text-indigo-400 transition">Create</button>
                <button onclick="showView('admin')" class="p-2 bg-slate-800 rounded-full hover:bg-slate-700 transition">
                    <i data-lucide="shield" class="w-5 h-5 text-indigo-400"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pb-20">
        
        <section id="view-profiles">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <h2 class="text-4xl font-bold">Discover <span class="gradient-text">Friends</span></h2>
                <div class="relative w-full md:w-72">
                    <i data-lucide="search" class="absolute left-3 top-3 w-4 h-4 text-slate-400"></i>
                    <input type="text" id="searchInput" placeholder="Search profiles..." class="w-full bg-slate-900 border border-slate-700 rounded-xl py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
                </div>
            </div>
            <div id="profileGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </section>

        <section id="view-join" class="hidden max-w-xl mx-auto">
            <div class="glass p-8 rounded-3xl">
                <h2 class="text-3xl font-bold mb-2">Join the Nexus</h2>
                <p class="text-slate-400 mb-6">Set up your profile to start receiving friend requests.</p>
                <form id="joinForm" class="space-y-4">
                    <input type="text" id="reg-name" placeholder="Full Name" class="w-full bg-slate-800 border-none rounded-xl p-4 focus:ring-2 focus:ring-indigo-500" required>
                    <input type="text" id="reg-tag" placeholder="Your Hobby (e.g. UI Designer)" class="w-full bg-slate-800 border-none rounded-xl p-4 focus:ring-2 focus:ring-indigo-500">
                    <textarea id="reg-bio" placeholder="Tell us about yourself..." class="w-full bg-slate-800 border-none rounded-xl p-4 h-32 focus:ring-2 focus:ring-indigo-500"></textarea>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-indigo-500/20">Publish Profile</button>
                </form>
            </div>
        </section>

        <section id="view-admin" class="hidden">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-4xl font-bold">Inbox</h2>
                    <p class="text-slate-400">Manage incoming friend applications</p>
                </div>
                <button onclick="clearApps()" class="text-xs text-red-400 hover:underline">Clear History</button>
            </div>
            <div id="adminPanel" class="space-y-4">
                </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. YOUR FIREBASE CONFIG GOES HERE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- View Controller ---
        window.showView = (viewName) => {
            ['profiles', 'join', 'admin'].forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden');
            });
            document.getElementById(`view-${viewName}`).classList.remove('hidden');
            lucide.createIcons();
        };

        // --- Logic: Create Profile ---
        document.getElementById('joinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "users"), {
                name: document.getElementById('reg-name').value,
                tag: document.getElementById('reg-tag').value,
                bio: document.getElementById('reg-bio').value,
                timestamp: serverTimestamp()
            });
            alert('Profile Live!');
            showView('profiles');
        });

        // --- Logic: Real-time Profile Sync ---
        onSnapshot(query(collection(db, "users"), orderBy("timestamp", "desc")), (snapshot) => {
            const grid = document.getElementById('profileGrid');
            grid.innerHTML = '';
            snapshot.forEach(doc => {
                const user = doc.data();
                grid.innerHTML += `
                    <div class="glass p-6 rounded-2xl border-l-4 border-indigo-500 hover:scale-[1.02] transition">
                        <span class="text-[10px] uppercase tracking-widest text-indigo-400 font-bold">${user.tag}</span>
                        <h3 class="text-xl font-bold mt-1">${user.name}</h3>
                        <p class="text-slate-400 text-sm mt-3 mb-6 line-clamp-3">${user.bio}</p>
                        <button onclick="openApply('${doc.id}', '${user.name}')" class="text-sm font-semibold flex items-center gap-2 text-indigo-400 hover:text-white transition">
                            Apply <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
            });
            lucide.createIcons();
        });

        // --- Logic: Friend Application ---
        window.openApply = async (targetId, targetName) => {
            const sender = prompt("Your Name:");
            const msg = prompt("Your Message to " + targetName + ":");
            if(sender && msg) {
                await addDoc(collection(db, "apps"), {
                    sender, targetName, msg, timestamp: serverTimestamp()
                });
                alert('Request sent to the Nexus!');
            }
        };

        // --- Logic: Admin Inbox ---
        onSnapshot(query(collection(db, "apps"), orderBy("timestamp", "desc")), (snapshot) => {
            const panel = document.getElementById('adminPanel');
            panel.innerHTML = '';
            snapshot.forEach(doc => {
                const app = doc.data();
                panel.innerHTML += `
                    <div class="glass p-5 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center font-bold">${app.sender[0]}</div>
                            <div>
                                <p class="font-bold">${app.sender} <span class="text-slate-500 font-normal">wants to be friends with</span> ${app.targetName}</p>
                                <p class="text-slate-400 text-sm italic">"${app.msg}"</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        });

        lucide.createIcons();
    </script>
</body>
</html>
