<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus // Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #ffffff;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .view { display: none; }
        .view.active { display: block; animation: fadeInUp 0.4s ease forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-2xl font-black tracking-tighter">NEXUS<span class="text-indigo-500">.</span></h1>
            <nav class="flex gap-2 bg-white/5 p-1 rounded-xl border border-white/10">
                <button onclick="showView('explore')" class="px-4 py-2 rounded-lg hover:bg-white/5 transition text-sm font-medium">Explore</button>
                <button onclick="showView('join')" class="px-4 py-2 rounded-lg hover:bg-white/5 transition text-sm font-medium">Join</button>
                <button onclick="showView('admin')" class="px-4 py-2 rounded-lg bg-indigo-600/20 text-indigo-400 border border-indigo-500/30">
                    <i data-lucide="shield" class="w-4 h-4"></i>
                </button>
            </nav>
        </header>

        <div id="view-explore" class="view active">
            <h2 class="text-4xl font-extrabold mb-8">Community <span class="text-indigo-500">Members</span></h2>
            <div id="profile-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>

        <div id="view-join" class="view">
            <div class="glass p-8 rounded-3xl max-w-md mx-auto">
                <h2 class="text-2xl font-bold mb-6 text-center">Create Profile</h2>
                <div class="space-y-4">
                    <input type="text" id="name" placeholder="Full Name" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 outline-none focus:border-indigo-500">
                    <input type="text" id="tag" placeholder="Hobby (e.g. Gamer, Coder)" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 outline-none focus:border-indigo-500">
                    <textarea id="bio" placeholder="Bio..." class="w-full bg-black/40 border border-white/10 rounded-xl p-3 h-32 outline-none focus:border-indigo-500"></textarea>
                    <button onclick="saveProfile()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold shadow-lg shadow-indigo-600/20 transition">Publish</button>
                </div>
            </div>
        </div>

        <div id="view-admin" class="view">
            <h2 class="text-3xl font-bold mb-6 flex items-center gap-3">
                <i data-lucide="mail"></i> Friend Submissions
            </h2>
            <div id="admin-list" class="space-y-3">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- 1. REPLACE THIS WITH YOUR FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "your-app.firebaseapp.com",
            projectId: "your-app",
            storageBucket: "your-app.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- View Controller ---
        window.showView = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            lucide.createIcons();
        };

        // --- Save Profile ---
        window.saveProfile = async () => {
            const name = document.getElementById('name').value;
            const tag = document.getElementById('tag').value;
            const bio = document.getElementById('bio').value;

            if(!name) return alert("Enter a name!");
            await addDoc(collection(db, "users"), { name, tag, bio, time: serverTimestamp() });
            showView('explore');
        };

        // --- Real-time Sync Profiles ---
        onSnapshot(query(collection(db, "users"), orderBy("time", "desc")), (snap) => {
            const list = document.getElementById('profile-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                const u = doc.data();
                list.innerHTML += `
                    <div class="glass p-6 rounded-2xl hover:border-indigo-500 transition group">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] font-bold uppercase tracking-widest text-indigo-400">${u.tag || 'Member'}</span>
                        </div>
                        <h3 class="text-xl font-bold">${u.name}</h3>
                        <p class="text-slate-400 text-sm mt-2 mb-6">${u.bio}</p>
                        <button onclick="apply('${doc.id}', '${u.name}')" class="text-sm font-bold text-indigo-400 flex items-center gap-1 group-hover:gap-2 transition-all">
                            Send Request <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
            });
            lucide.createIcons();
        });

        // --- Apply Logic ---
        window.apply = async (id, toName) => {
            const sender = prompt("Your Name:");
            const msg = prompt("Message for " + toName + ":");
            if(sender && msg) {
                await addDoc(collection(db, "apps"), { sender, toName, msg, time: serverTimestamp() });
                alert("Request Sent!");
            }
        };

        // --- Admin Sync ---
        onSnapshot(query(collection(db, "apps"), orderBy("time", "desc")), (snap) => {
            const list = document.getElementById('admin-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                const a = doc.data();
                list.innerHTML += `
                    <div class="glass p-5 rounded-2xl flex flex-col md:flex-row justify-between border-l-4 border-l-indigo-600">
                        <div>
                            <p class="font-bold">${a.sender} <span class="text-slate-500 font-normal">wants to be friends with</span> ${a.toName}</p>
                            <p class="text-slate-400 text-sm mt-1 italic">"${a.msg}"</p>
                        </div>
                    </div>
                `;
            });
        });

        lucide.createIcons();
    </script>
</body>
</html>
